name: GitHub Bot

on:
  schedule:
    - cron: "0 14 * * 2"    # 2:00 PM UTC Tuesday
    - cron: "0 9 * * 6"     # 9:00 AM UTC Saturday
    - cron: "0 15 * * 6"    # 3:00 PM UTC Saturday
  workflow_dispatch:
    inputs:
      run_reason:
        description: "Reason for running the workflow"
        required: false

jobs:
  bot-job:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set Up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.9"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install gitpython wonderwords PyGithub

    - name: Run Bot Script
      env:
        GITHUB_ACTOR: jibranusman95
        GITHUB_TOKEN: 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
      run: |
        python <<EOF
        import os
        import datetime
        from git import Repo
        from github import Github
        from wonderwords import RandomSentence

        REPO_PATH = os.getcwd()
        TOKEN = os.getenv("GITHUB_TOKEN")
        REPO_NAME = "jibranusman95/project-manager-rails"

        # Local git setup
        repo = Repo(REPO_PATH)
        with repo.config_writer() as config:
            config.set_value("user", "name", "jibranusman95")
            config.set_value("user", "email", "jibran.usman@hotmail.com")

        # GitHub API setup
        g = Github(TOKEN)
        gh_repo = g.get_repo(REPO_NAME)

        # --- Close old bot PRs and issues ---
        for pr in gh_repo.get_pulls(state="open"):
            if "Timestamps PR" in pr.title:
                pr.edit(state="closed")
                print(f"Closed old PR: {pr.title}")

        for issue in gh_repo.get_issues(state="open"):
            if "Timestamp Issue" in issue.title:
                issue.edit(state="closed")
                print(f"Closed old issue: {issue.title}")

        # --- Make a file change with a random sentence ---
        s = RandomSentence()
        sentence = s.sentence()

        file_path = os.path.join(REPO_PATH, "data.txt")
        if not os.path.exists(file_path):
            with open(file_path, "w") as file:
                file.write("File created.\n")

        with open(file_path, "a") as file:
            file.write(f"Update: {datetime.datetime.now()} — {sentence}\n")

        # --- Commit, branch, push ---
        repo.git.add(all=True)
        if repo.is_dirty():
            branch_name = f"update-{datetime.datetime.now().strftime('%Y%m%d%H%M%S')}"
            repo.git.checkout("-b", branch_name)
            repo.index.commit(f"Updated timestamps — {sentence}")
            origin = repo.remote(name="origin")
            origin.push(refspec=f"{branch_name}:{branch_name}")
            print(f"Pushed branch: {branch_name}")

            # --- Create PR ---
            pr = gh_repo.create_pull(
                title=f"Timestamps PR: {sentence}",
                body=f"This PR was auto-generated.\n\nRandom sentence: {sentence}",
                head=branch_name,
                base="main"
            )
            print(f"Created PR #{pr.number}: {pr.title}")

            # --- Create a tracking issue ---
            issue = gh_repo.create_issue(
                title=f"Timestamp Issue: {sentence}",
                body=f"Tracking issue for PR #{pr.number}."
            )
            print(f"Created issue #{issue.number}: {issue.title}")
        else:
            print("No changes to commit.")
        EOF
